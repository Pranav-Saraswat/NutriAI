services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutriai_web
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      MONGO_URI: mongodb://mongo:27017/
      MONGO_DB_NAME: nutriai_db
      SESSION_COOKIE_SECURE: "False"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo:
    image: mongo:7.0
    container_name: nutriai_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo \"db.runCommand({ ping: 1 }).ok\" | mongosh mongodb://localhost:27017/admin --quiet | grep 1 >/dev/null"
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

volumes:
  mongodb_data:
