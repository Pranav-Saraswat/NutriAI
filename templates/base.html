<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NutriAI{% endblock %} - Your AI-Powered Personal Nutritionist</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('main.index') }}" class="logo">🥗 NutriAI</a>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle">🌙</button>
                
                {% if session.get('user_id') %}
                    <!-- Logged In -->
                    <a href="{{ url_for('main.chat_interface') }}" class="btn btn-secondary btn-sm">Chat</a>
                    <a href="{{ url_for('main.profile') }}" class="btn btn-secondary btn-sm">Profile</a>
                    <a href="{{ url_for('main.logout') }}" class="btn btn-primary btn-sm">Log Out</a>
                {% else %}
                    <!-- Not Logged In -->
                    <a href="{{ url_for('main.login') }}" class="btn btn-secondary btn-sm">Log In</a>
                    <a href="{{ url_for('main.register') }}" class="btn btn-primary btn-sm">Get Started</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-brand">🥗 NutriAI</div>
            <div class="footer-links">
                <a href="{{ url_for('main.index') }}">Home</a>
                {% if session.get('user_id') %}
                    <a href="{{ url_for('main.chat_interface') }}">Chat</a>
                    <a href="{{ url_for('main.profile') }}">Profile</a>
                {% endif %}
                <a href="#">About</a>
                <a href="#">Privacy</a>
            </div>
            <div class="footer-copyright">
                © 2026 NutriAI. All rights reserved.
            </div>
        </div>
    </footer>

    <script>
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        
        // Check saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark-theme');
            themeToggle.textContent = '☀️';
        }
        
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-theme');
            const isDark = body.classList.contains('dark-theme');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>
</html>
